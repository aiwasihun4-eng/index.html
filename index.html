<!DOCTYPE html>
<html lang="am">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>WASIHUN-AI | የወደፊት ቴክኖሎጂ</title>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <style>
        body {
            margin: 0; padding: 0; font-family: 'Segoe UI', sans-serif;
            background: linear-gradient(-45deg, #ee7752, #e73c7e, #23a6d5, #23d5ab);
            background-size: 400% 400%;
            animation: backgroundMove 15s ease infinite;
            height: 100vh; display: flex; justify-content: center; align-items: center; color: white; overflow: hidden;
        }

        @keyframes backgroundMove { 0% { background-position: 0% 50%; } 50% { background-position: 100% 50%; } 100% { background-position: 0% 50%; } }

        .logo-text {
            font-size: 3rem; font-weight: bold; margin-bottom: 10px;
            display: inline-block;
            animation: float 3s ease-in-out infinite, rainbow 8s linear infinite;
        }

        @keyframes float { 0%, 100% { transform: translateY(0); } 50% { transform: translateY(-15px); } }
        @keyframes rainbow {
            0% { color: #ffffff; } 25% { color: #ffd700; } 50% { color: #00ffcc; } 75% { color: #ff00de; } 100% { color: #ffffff; }
        }

        .card {
            background: rgba(255, 255, 255, 0.15); backdrop-filter: blur(20px);
            padding: 30px; border-radius: 25px; box-shadow: 0 10px 40px rgba(0,0,0,0.2);
            border: 1px solid rgba(255, 255, 255, 0.3); width: 420px; text-align: center;
        }

        .chat-container {
            background: rgba(0,0,0,0.2); height: 250px; overflow-y: auto;
            padding: 15px; border-radius: 15px; text-align: left; margin-bottom: 15px;
            font-size: 0.9rem; line-height: 1.5; border: 1px solid rgba(255,255,255,0.1);
        }

        input, textarea {
            width: 100%; padding: 12px; margin: 8px 0; border-radius: 10px; border: none;
            background: rgba(255, 255, 255, 0.2); color: white; box-sizing: border-box;
        }

        button {
            width: 100%; padding: 12px; margin-top: 10px; border-radius: 10px; border: none;
            background: #ffffff; color: #e73c7e; font-weight: bold; cursor: pointer; transition: 0.3s;
        }
        button:hover { background: #ffd700; color: #000; }

        .hidden { display: none; }
    </style>
</head>
<body>

    <div id="app" class="card">
        <div class="logo-text">WASIHUN-AI</div>

        <div id="auth-section">
            <p id="quote">"በቃላት የማይገለጹ ጥበቦችን በ WASIHUN-AI አሳክተው ለዓለም ያሳዩ።"</p>
            <input type="text" id="name" placeholder="ሙሉ ስም">
            <input type="email" id="email" placeholder="Gmail">
            <input type="password" id="pass" placeholder="Password (6 ድጂት)" maxlength="6">
            <button onclick="signUp()">Sign Up</button>
            <p style="cursor:pointer; font-size:0.8rem;" onclick="toggleAuth()">አካውንት አለኝ? Login</p>
        </div>

        <div id="chat-section" class="hidden">
            <h3 id="welcome-msg">እንኳን ደህና መጡ!</h3>
            <div id="chat-box" class="chat-container">
                <div><b>WASIHUN-AI:</b> ሰላም! ምን ልርዳዎት?</div>
            </div>
            <textarea id="user-input" placeholder="ጥያቄዎን እዚህ ይጻፉ..."></textarea>
            <button id="send-btn" onclick="askGemini()">AIን ጠይቅ</button>
            <button onclick="location.reload()" style="background:#ff4757; color:white;">Logout</button>
        </div>
    </div>

    <script>
        // Config
        const S_URL = 'https://jdyrjrqgelfnditlpveb.supabase.co';
        const S_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImpkeXJqcnFnZWxmbmRpdGxwdmViIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzYwMTY3MTMsImV4cCI6MjA5MTU5MjcxM30.KZIF4VD3SrjLd-KQ_gA0Z9BcxSJR_Ty1x4FYPiI_q4o';
        const GEMINI_API_KEY = 'AIzaSyAdWBWJQKyPtfGlU6n-X3iBI0_fTQLWtDY';
        
        const supabaseClient = supabase.createClient(S_URL, S_KEY);

        function toggleAuth() {
            const isLogin = document.querySelector('button').innerText === "Login";
            document.querySelector('button').innerText = isLogin ? "Sign Up" : "Login";
            document.getElementById('name').style.display = isLogin ? "block" : "none";
        }

        async function signUp() {
            const n = document.getElementById('name').value;
            const e = document.getElementById('email').value;
            const p = document.getElementById('pass').value;

            if(document.querySelector('button').innerText === "Sign Up") {
                const { error } = await supabaseClient.from('profiles').insert([{ full_name: n, email: e }]);
                if(error) return alert(error.message);
                localStorage.setItem('userName', n);
                alert("ተመዝግበዋል! አሁን Login ያድርጉ።");
                toggleAuth();
            } else {
                // Simple Login
                document.getElementById('auth-section').classList.add('hidden');
                document.getElementById('chat-section').classList.remove('hidden');
                document.getElementById('welcome-msg').innerText = "ሰላም " + (localStorage.getItem('userName') || "ተጠቃሚ");
            }
        }

        async function askGemini() {
            const input = document.getElementById('user-input');
            const chatBox = document.getElementById('chat-box');
            const btn = document.getElementById('send-btn');
            
            if(!input.value) return;

            const userText = input.value;
            chatBox.innerHTML += `<div><b>እርስዎ:</b> ${userText}</div>`;
            input.value = "";
            btn.innerText = "በማሰብ ላይ...";
            btn.disabled = true;

            try {
                const response = await fetch(`https://generativelanguage.googleapis.com/v1beta/models/gemini-pro:generateContent?key=${GEMINI_API_KEY}`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ contents: [{ parts: [{ text: userText }] }] })
                });

                const data = await response.json();
                const aiMsg = data.candidates[0].content.parts[0].text;
                chatBox.innerHTML += `<div><b>WASIHUN-AI:</b> ${aiMsg}</div>`;
                chatBox.scrollTop = chatBox.scrollHeight;
            } catch (e) {
                chatBox.innerHTML += `<div><b>ስህተት:</b> ግንኙነት ተቋርጧል።</div>`;
            } finally {
                btn.innerText = "AIን ጠይቅ";
                btn.disabled = false;
            }
        }
    </script>
</body>
</html>
