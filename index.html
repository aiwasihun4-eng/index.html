<!DOCTYPE html>
<html lang="am">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>WASIHUN-AI | የወደፊት ቴክኖሎጂ</title>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <style>
        body {
            margin: 0; padding: 0; font-family: 'Segoe UI', sans-serif;
            background: linear-gradient(-45deg, #ee7752, #e73c7e, #23a6d5, #23d5ab);
            background-size: 400% 400%;
            animation: gradient 15s ease infinite;
            height: 100vh; display: flex; justify-content: center; align-items: center; color: white; overflow: hidden;
        }

        @keyframes gradient { 0% { background-position: 0% 50%; } 50% { background-position: 100% 50%; } 100% { background-position: 0% 50%; } }

        .logo-text {
            font-size: 3rem; font-weight: bold;
            background: linear-gradient(to right, #fff, #ffd700, #fff);
            -webkit-background-clip: text; -webkit-text-fill-color: transparent;
            margin-bottom: 10px; filter: drop-shadow(0 0 10px rgba(255,255,255,0.5));
            animation: moveLogo 3s ease-in-out infinite; display: inline-block;
        }

        @keyframes moveLogo { 0%, 100% { transform: translateY(0); } 50% { transform: translateY(-15px); } }

        .card {
            background: rgba(255, 255, 255, 0.1); backdrop-filter: blur(15px);
            padding: 30px; border-radius: 20px; box-shadow: 0 8px 32px 0 rgba(31, 38, 135, 0.37);
            border: 1px solid rgba(255, 255, 255, 0.18); width: 400px; text-align: center;
        }

        .quote-text { font-size: 0.95rem; line-height: 1.6; margin-bottom: 20px; color: #ffffff; text-shadow: 1px 1px 2px rgba(0,0,0,0.3); }

        input { width: 100%; padding: 12px; margin: 8px 0; border-radius: 8px; border: none; background: rgba(255, 255, 255, 0.2); color: white; box-sizing: border-box; }
        button { width: 100%; padding: 12px; margin-top: 15px; border-radius: 8px; border: none; background: #fff; color: #e73c7e; font-weight: bold; cursor: pointer; transition: 0.3s; }
        button:hover { background: #ffd700; color: #000; transform: scale(1.02); }

        .hidden { display: none; }
        .switch-btn { margin-top: 15px; font-size: 0.85rem; cursor: pointer; text-decoration: underline; }
    </style>
</head>
<body>

    <div id="auth-container" class="card">
        <div class="logo-text">WASIHUN-AI</div>
        
        <div id="signup-form">
            <p class="quote-text">"በቃላት የማይገለጹ ጥበቦችን፣ በምስል የማይታዩ ህልሞችን እና ሊደረሱ የማይችሉ ግቦችን በ WASIHUN-AI እገዛ አሳክተው ለዓለም ያሳዩ።"</p>
            <input type="text" id="regName" placeholder="ሙሉ ስም">
            <input type="tel" id="regPhone" value="+251">
            <input type="email" id="regEmail" placeholder="Gmail">
            <input type="password" id="regPass" placeholder="Password (6 ድጂት)" maxlength="6">
            <button onclick="handleSignUp()">Sign Up</button>
            <p class="switch-btn" onclick="toggleAuth()">አካውንት አለኝ? Login</p>
        </div>

        <div id="login-form" class="hidden">
            <p class="quote-text">"ከመረጃም በላይ ዕውቀትን፣ ከቴክኖሎጂም በላይ ግንኙነትን የሚፈጥር፤ WASIHUN-AI የዲጂታል ጉዞዎ ብሩህ ፋኖስ።"</p>
            <input type="email" id="loginEmail" placeholder="Gmail">
            <input type="password" id="loginPass" placeholder="Password" maxlength="6">
            <button onclick="handleLogin()">Login</button>
            <p class="switch-btn" onclick="toggleAuth()">አዲስ ነኝ? Sign Up</p>
        </div>
    </div>

    <div id="dashboard" class="card hidden" style="width: 85%; max-width: 600px;">
        <div class="logo-text">WASIHUN-AI</div>
        <h2 id="welcomeMessage">እንኳን በደህና መጡ!</h2>
        <div id="ai-section">
            <textarea id="aiPrompt" style="width:100%; height:80px; border-radius:10px; padding:10px; margin-bottom:10px;" placeholder="ጥያቄዎን እዚህ ይጻፉ..."></textarea>
            <button onclick="askAI()">AIን ጠይቅ</button>
            <p id="aiResponse" style="margin-top:15px; font-weight:bold;"></p>
        </div>
        <button onclick="location.reload()" style="background: #ff4b2b; color: white; margin-top: 20px;">Logout</button>
    </div>

    <script>
        // Supabase Initialization
        const SUPABASE_URL = 'https://jdyrjrqgelfnditlpveb.supabase.co';
        const SUPABASE_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImpkeXJqcnFnZWxmbmRpdGxwdmViIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzYwMTY3MTMsImV4cCI6MjA5MTU5MjcxM30.KZIF4VD3SrjLd-KQ_gA0Z9BcxSJR_Ty1x4FYPiI_q4o';
        const supabase = supabase.createClient(SUPABASE_URL, SUPABASE_KEY);

        function toggleAuth() {
            document.getElementById('signup-form').classList.toggle('hidden');
            document.getElementById('login-form').classList.toggle('hidden');
        }

        async function handleSignUp() {
            const name = document.getElementById('regName').value;
            const email = document.getElementById('regEmail').value;
            const phone = document.getElementById('regPhone').value;
            const pass = document.getElementById('regPass').value;

            if(!name || !email || pass.length !== 6) {
                alert("እባክዎን መረጃዎችን በትክክል ይሙሉ!"); return;
            }

            // Supabase Auth + Database
            const { data, error } = await supabase.from('profiles').insert([
                { full_name: name, email: email, phone_number: phone }
            ]);

            if (error) { alert("ስህተት፡ " + error.message); } 
            else { 
                localStorage.setItem('userName', name);
                alert("ተመዝግበዋል! አሁን Login ያድርጉ።"); 
                toggleAuth(); 
            }
        }

        function handleLogin() {
            // ለጊዜው በLocalStorage እናረጋግጣለን
            const name = localStorage.getItem('userName') || "ተጠቃሚ";
            document.getElementById('auth-container').classList.add('hidden');
            document.getElementById('dashboard').classList.remove('hidden');
            document.getElementById('welcomeMessage').innerText = `እንኳን በደህና መጡ ${name}!`;
        }

        function askAI() {
            const prompt = document.getElementById('aiPrompt').value;
            if(!prompt) return;
            document.getElementById('aiResponse').innerText = "በማሰብ ላይ ነኝ... (AI API ሲቀጠል መልሱ እዚህ ይታያል)";
        }
    </script>
</body>
</html>
