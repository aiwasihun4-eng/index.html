<!DOCTYPE html>
<html lang="am">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>WASIHUN-AI | Voice Mode</title>
    <style>
        /* የሚያምር ጥቁር እና ወርቃማ ዲዛይን */
        body {
            margin: 0; padding: 0;
            background: radial-gradient(circle, #1a1a2e, #0f0c29);
            height: 100vh; display: flex; flex-direction: column;
            justify-content: center; align-items: center;
            color: white; font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            overflow: hidden;
        }

        .container { text-align: center; width: 90%; max-width: 400px; }

        .mic-circle {
            width: 140px; height: 140px;
            background: #ffd700; border-radius: 50%;
            display: flex; justify-content: center; align-items: center;
            font-size: 60px; cursor: pointer;
            box-shadow: 0 0 30px rgba(255, 215, 0, 0.4);
            transition: all 0.3s ease;
            margin: 0 auto;
        }

        /* ድምፅ ሲያዳምጥ የሚፈጠር አኒሜሽን */
        .listening {
            background: #ff4757;
            animation: pulse 1.2s infinite;
            box-shadow: 0 0 50px rgba(255, 71, 87, 0.6);
        }

        @keyframes pulse {
            0% { transform: scale(1); }
            50% { transform: scale(1.1); }
            100% { transform: scale(1); }
        }

        #status {
            margin-top: 40px; font-size: 1.3rem;
            color: #ffd700; font-weight: 500;
            min-height: 60px; line-height: 1.4;
        }

        .hint { margin-top: 10px; font-size: 0.9rem; opacity: 0.6; }
    </style>
</head>
<body>

    <div class="container">
        <div id="micBtn" class="mic-circle" onclick="toggleMic()">🎤</div>
        <div id="status">ለመጀመር ማይኩን ይጫኑ</div>
        <div class="hint">በድምፅ ብቻ የሚሰራ</div>
    </div>

    <script>
        // 1. ኤፒአይ መረጃዎች
        const API_KEY = "AIzaSyCDPT8UvR9sApQR30yS1hhB-0XfYfOg-zY";
        // የ 404 ስህተትን ለመፍታት ወደ v1beta ተቀይሯል
        const API_URL = `https://generativelanguage.googleapis.com/v1beta/models/gemini-1.5-flash:generateContent?key=${API_KEY}`;

        // 2. የድምፅ መስማት ዝግጅት
        const SpeechRecognition = window.SpeechRecognition || window.webkitSpeechRecognition;
        if (!SpeechRecognition) {
            document.getElementById('status').innerText = "ይቅርታ፣ ብሮውዘርህ ድምፅ አይቀበልም። Chrome ተጠቀም።";
        }
        
        const recognition = new SpeechRecognition();
        recognition.lang = 'am-ET'; // አማርኛ እንዲሰማ
        recognition.interimResults = false;

        let isListening = false;

        function toggleMic() {
            if (!isListening) {
                try {
                    recognition.start();
                    isListening = true;
                } catch (e) { console.error(e); }
            } else {
                recognition.stop();
                isListening = false;
            }
        }

        recognition.onstart = () => {
            document.getElementById('micBtn').classList.add('listening');
            document.getElementById('status').innerText = "እያዳመጥኩ ነው... ተናገር";
        };

        recognition.onend = () => {
            document.getElementById('micBtn').classList.remove('listening');
            isListening = false;
        };

        recognition.onresult = async (event) => {
            const userText = event.results[0][0].transcript;
            document.getElementById('status').innerText = "የሰማሁት፡ " + userText;
            
            // AIውን መጠየቅ
            await askWASIHUN(userText);
        };

        // 3. ከ AI ጋር መነጋገር
        async function askWASIHUN(prompt) {
            document.getElementById('status').innerText = "WASIHUN-AI በማሰብ ላይ...";
            
            try {
                const response = await fetch(API_URL, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({
                        contents: [{ parts: [{ text: prompt }] }],
                        systemInstruction: { 
                            parts: [{ text: "የአንተ ስም WASIHUN-AI ነው። አንተ የድምፅ ረዳት ስለሆንክ መልሶችህ በጣም አጭር፣ ግልጽ እና በአማርኛ ይሁኑ።" }] 
                        }
                    })
                });

                const data = await response.json();
                
                if (data.candidates && data.candidates[0].content) {
                    const aiResponse = data.candidates[0].content.parts[0].text;
                    document.getElementById('status').innerText = aiResponse;
                    speak(aiResponse);
                } else {
                    throw new Error("No candidates");
                }
            } catch (error) {
                console.error(error);
                document.getElementById('status').innerText = "ይቅርታ፣ ስህተት ተፈጥሯል። ድጋሚ ይሞክሩ።";
            }
        }

        // 4. መልሱን በድምፅ እንዲናገር (Text-to-Speech)
        function speak(text) {
            const synth = window.speechSynthesis;
            const utter = new SpeechSynthesisUtterance(text);
            utter.lang = 'am-ET'; // በአማርኛ እንዲያነብ
            
            utter.onstart = () => {
                document.getElementById('micBtn').style.opacity = "0.5";
            };
            
            utter.onend = () => {
                document.getElementById('micBtn').style.opacity = "1";
                document.getElementById('status').innerText = "ለመቀጠል ማይኩን ይጫኑ";
            };

            synth.speak(utter);
        }
    </script>
</body>
</html>
