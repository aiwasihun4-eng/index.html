<!DOCTYPE html>
<html lang="am">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>WASIHUN-AI | የወደፊት ቴክኖሎጂ</title>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <style>
        body {
            margin: 0; padding: 0; font-family: 'Segoe UI', sans-serif;
            background: linear-gradient(-45deg, #0f0c29, #302b63, #24243e, #00d2ff);
            background-size: 400% 400%; animation: gradientBG 15s ease infinite;
            height: 100vh; display: flex; justify-content: center; align-items: center; color: white; overflow: hidden;
        }
        @keyframes gradientBG { 0% { background-position: 0% 50%; } 50% { background-position: 100% 50%; } 100% { background-position: 0% 50%; } }

        .logo-text {
            font-size: 3.2rem; font-weight: 900; margin-bottom: 20px;
            display: inline-block;
            animation: bounce 3s ease-in-out infinite, glow 5s linear infinite;
            text-transform: uppercase; letter-spacing: 3px;
        }
        @keyframes bounce { 0%, 100% { transform: translateY(0); } 50% { transform: translateY(-15px); } }
        @keyframes glow {
            0% { color: #fff; text-shadow: 0 0 10px #00d2ff; }
            33% { color: #ffd700; text-shadow: 0 0 10px #ffd700; }
            66% { color: #ff00de; text-shadow: 0 0 10px #ff00de; }
            100% { color: #fff; text-shadow: 0 0 10px #00d2ff; }
        }

        .card {
            background: rgba(255, 255, 255, 0.1); backdrop-filter: blur(20px);
            padding: 25px; border-radius: 25px; box-shadow: 0 15px 35px rgba(0,0,0,0.3);
            border: 1px solid rgba(255, 255, 255, 0.2); width: 90%; max-width: 420px; text-align: center;
        }
        .chat-box {
            background: rgba(0,0,0,0.3); height: 300px; overflow-y: auto;
            padding: 15px; border-radius: 15px; text-align: left; margin-bottom: 15px;
            font-size: 0.95rem; border: 1px solid rgba(255,255,255,0.1);
        }
        textarea {
            width: 100%; height: 70px; border-radius: 12px; border: none; padding: 12px;
            background: rgba(255, 255, 255, 0.2); color: white; font-size: 1rem; box-sizing: border-box; resize: none;
        }
        button {
            width: 100%; padding: 12px; border-radius: 12px; border: none;
            background: #ffd700; color: #000; font-weight: bold; cursor: pointer; transition: 0.3s;
        }
        button:hover { transform: scale(1.02); background: #fff; }
        .hidden { display: none; }
        .ai-m { color: #ffd700; margin-top: 10px; background: rgba(0,0,0,0.1); padding: 8px; border-radius: 8px; }
    </style>
</head>
<body>

    <div class="card">
        <div class="logo-text">WASIHUN-AI</div>
        
        <div id="auth">
            <p style="font-size: 0.9rem; margin-bottom: 20px;">ወደ መተግበሪያው ለመግባት ስምዎን ያስገቡ</p>
            <input type="text" id="uName" placeholder="ሙሉ ስም" style="width:100%; padding:10px; margin-bottom:15px; border-radius:8px; border:none;">
            <button onclick="enter()">አፕሊኬሽኑን ክፈት</button>
        </div>

        <div id="main" class="hidden">
            <div id="chatDisplay" class="chat-box">
                <div class="ai-m"><b>WASIHUN-AI:</b> ሰላም! ምን ልርዳዎት? ማንኛውንም ጥያቄ እዚህ መጠየቅ ይችላሉ።</div>
            </div>
            <textarea id="userInput" placeholder="ጥያቄዎን እዚህ ይጻፉ..."></textarea>
            <button id="askBtn" onclick="askAI()">AIን ጠይቅ</button>
            <button onclick="location.reload()" style="background:#ff4757; color:white; margin-top:10px;">Logout</button>
        </div>
    </div>

    <script>
        const KEY = 'AIzaSyDLgooqNDulL-_FLoIC5aEOP3sIVVwWxzI';

        function enter() {
            const name = document.getElementById('uName').value;
            if(!name) return alert("እባክዎ ስም ያስገቡ");
            document.getElementById('auth').classList.add('hidden');
            document.getElementById('main').classList.remove('hidden');
        }

        async function askAI() {
            const input = document.getElementById('userInput');
            const display = document.getElementById('chatDisplay');
            const btn = document.getElementById('askBtn');
            const text = input.value.trim();

            if(!text) return;

            display.innerHTML += `<div><b>እርስዎ:</b> ${text}</div>`;
            input.value = "";
            btn.innerText = "በማሰብ ላይ...";
            btn.disabled = true;

            try {
                const res = await fetch(`https://generativelanguage.googleapis.com/v1beta/models/gemini-1.5-flash:generateContent?key=${KEY}`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ contents: [{ parts: [{ text: text }] }] })
                });

                const data = await res.json();
                const aiText = data.candidates[0].content.parts[0].text;
                display.innerHTML += `<div class="ai-m"><b>WASIHUN-AI:</b> ${aiText}</div>`;
            } catch (e) {
                display.innerHTML += `<div style="color:#ff4757;"><b>ስህተት:</b> ግንኙነት የለም። እባክዎ ኢንተርኔትዎን ያረጋግጡ።</div>`;
            } finally {
                btn.innerText = "AIን ጠይቅ";
                btn.disabled = false;
                display.scrollTop = display.scrollHeight;
            }
        }
    </script>
</body>
</html>
