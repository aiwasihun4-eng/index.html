<!DOCTYPE html>
<html lang="am">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>WASIHUN-AI</title>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <style>
        body {
            margin: 0; padding: 0; font-family: 'Segoe UI', sans-serif;
            background: linear-gradient(-45deg, #0f0c29, #302b63, #24243e, #00d2ff);
            background-size: 400% 400%; animation: gradientBG 15s ease infinite;
            height: 100vh; display: flex; justify-content: center; align-items: center; color: white; overflow: hidden;
        }
        @keyframes gradientBG { 0% { background-position: 0% 50%; } 50% { background-position: 100% 50%; } 100% { background-position: 0% 50%; } }
        .logo-text { font-size: 3rem; font-weight: 900; animation: bounce 3s ease-in-out infinite, glow 5s linear infinite; margin-bottom: 20px; text-transform: uppercase; }
        @keyframes bounce { 0%, 100% { transform: translateY(0); } 50% { transform: translateY(-15px); } }
        @keyframes glow { 0% { color: #fff; text-shadow: 0 0 10px #00d2ff; } 50% { color: #ffd700; text-shadow: 0 0 10px #ffd700; } 100% { color: #fff; text-shadow: 0 0 10px #00d2ff; } }
        .card { background: rgba(255, 255, 255, 0.1); backdrop-filter: blur(20px); padding: 25px; border-radius: 25px; width: 90%; max-width: 420px; text-align: center; border: 1px solid rgba(255, 255, 255, 0.2); }
        .chat-box { background: rgba(0,0,0,0.3); height: 300px; overflow-y: auto; padding: 15px; border-radius: 15px; text-align: left; margin-bottom: 15px; border: 1px solid rgba(255,255,255,0.1); }
        textarea { width: 100%; height: 70px; border-radius: 12px; border: none; padding: 12px; background: rgba(255, 255, 255, 0.2); color: white; font-size: 1rem; box-sizing: border-box; resize: none; margin-bottom: 10px; }
        button { width: 100%; padding: 12px; border-radius: 12px; border: none; background: #ffd700; color: #000; font-weight: bold; cursor: pointer; transition: 0.3s; }
        button:hover { background: #fff; }
        .ai-m { color: #ffd700; margin-top: 10px; background: rgba(0,0,0,0.1); padding: 8px; border-radius: 8px; }
    </style>
</head>
<body>
    <div class="card">
        <div class="logo-text">WASIHUN-AI</div>
        <div id="chatDisplay" class="chat-box">
            <div class="ai-m"><b>WASIHUN-AI:</b> ሰላም ዋሲሁን! አሁን መተግበሪያው ተስተካክሏል። ማንኛውንም ነገር ጠይቀኝ።</div>
        </div>
        <textarea id="userInput" placeholder="ጥያቄዎን እዚህ ይጻፉ..."></textarea>
        <button id="askBtn" onclick="askAI()">AIን ጠይቅ</button>
        <button onclick="location.reload()" style="background:#ff4757; color:white; margin-top:10px;">Logout</button>
    </div>

    <script>
        const KEY = 'AIzaSyDLgooqNDulL-_FLoIC5aEOP3sIVVwWxzI';

        async function askAI() {
            const input = document.getElementById('userInput');
            const display = document.getElementById('chatDisplay');
            const btn = document.getElementById('askBtn');
            const text = input.value.trim();

            if(!text) return;

            display.innerHTML += `<div><b>እርስዎ:</b> ${text}</div>`;
            input.value = "";
            btn.innerText = "በማሰብ ላይ...";
            btn.disabled = true;
            display.scrollTop = display.scrollHeight;

            try {
                const response = await fetch(`https://generativelanguage.googleapis.com/v1beta/models/gemini-1.5-flash:generateContent?key=${KEY}`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({
                        contents: [{ parts: [{ text: text }] }]
                    })
                });

                const data = await response.json();

                if (data.candidates && data.candidates.length > 0) {
                    const aiText = data.candidates[0].content.parts[0].text;
                    display.innerHTML += `<div class="ai-m"><b>WASIHUN-AI:</b> ${aiText}</div>`;
                } else {
                    display.innerHTML += `<div style="color:red;"><b>ስህተት:</b> AIው መልስ አልሰጠም። እባክህ ቁልፉን (Key) አረጋግጥ።</div>`;
                }
            } catch (e) {
                display.innerHTML += `<div style="color:red;"><b>ስህተት:</b> ግንኙነት የለም። እባክህ ኢንተርኔትህን አረጋግጥ።</div>`;
            } finally {
                btn.innerText = "AIን ጠይቅ";
                btn.disabled = false;
                display.scrollTop = display.scrollHeight;
            }
        }
    </script>
</body>
</html>
