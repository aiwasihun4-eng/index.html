<!DOCTYPE html>
<html lang="am">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Zagwe Saving and Credit</title>
    <style>
        :root {
            --primary-gradient: linear-gradient(270deg, #ff0000, #ff7f00, #ffff00, #00ff00, #0000ff, #4b0082, #8b00ff);
        }

        body {
            background-color: #0f172a;
            color: #f8fafc;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            margin: 0;
            display: flex;
            flex-direction: column;
            align-items: center;
            min-height: 100vh;
        }

        /* ህብረ ቀለም አኒሜሽን ርዕስ */
        .header-title {
            font-size: 3.5rem;
            font-weight: 900;
            text-align: center;
            background: var(--primary-gradient);
            background-size: 1000% 1000%;
            animation: rainbowFlow 10s ease infinite;
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            margin: 40px 0;
            text-transform: uppercase;
        }

        @keyframes rainbowFlow {
            0% { background-position: 0% 50%; }
            50% { background-position: 100% 50%; }
            100% { background-position: 0% 50%; }
        }

        .container {
            width: 90%;
            max-width: 1000px;
            background: #1e293b;
            padding: 30px;
            border-radius: 20px;
            box-shadow: 0 10px 25px rgba(0,0,0,0.5);
        }

        /* የመግቢያ ካርዶች */
        .login-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
            gap: 20px;
            margin-top: 30px;
        }

        .role-card {
            background: #334155;
            padding: 20px;
            border-radius: 15px;
            text-align: center;
            cursor: pointer;
            transition: 0.3s;
            border: 2px solid transparent;
        }

        .role-card:hover {
            border-color: #38bdf8;
            transform: translateY(-5px);
            background: #475569;
        }

        .role-card h3 { margin: 10px 0; font-size: 1.2rem; }

        /* ፎርሞች */
        .section { display: none; margin-top: 20px; border-top: 1px solid #475569; padding-top: 20px; }
        .active { display: block; }

        input, select, button {
            width: 100%;
            padding: 12px;
            margin: 10px 0;
            border-radius: 8px;
            border: none;
            outline: none;
        }

        input { background: #0f172a; color: white; }
        button {
            background: #38bdf8;
            color: #0f172a;
            font-weight: bold;
            cursor: pointer;
        }

        button:hover { background: #0ea5e9; }

        .back-btn { background: #64748b; margin-top: 20px; }

    </style>
</head>
<body>

    <h1 class="header-title">ZAGWAE Saving & Credit</h1>

    <div class="container">
        <div id="roleSelection" class="login-grid">
            <div class="role-card" onclick="showSection('managerPanel')"><h3>MAIN-MANAGER</h3></div>
            <div class="role-card" onclick="showSection('subManagerPanel')"><h3>SUB-MANAGER</h3></div>
            <div class="role-card" onclick="showSection('cashierPanel')"><h3>CASHIER</h3></div>
            <div class="role-card" onclick="showSection('auditorPanel')"><h3>AUDITOR</h3></div>
        </div>

        <div id="managerPanel" class="section">
            <h2>Main Manager - Control Panel</h2>
            <p>የሰራተኞች ሁኔታ፡ <span style="color: #4ade80;">Active</span></p>
            <button onclick="alert('የሰራተኛ መረጃ ተቀይሯል!')">Usernames & Passwords ቀይር</button>
            <button style="background: #ef4444;" onclick="alert('ተጠቃሚው ታግዷል!')">ደንበኛ አግድ (Block Customer)</button>
            <button class="back-btn" onclick="goBack()">ተመለስ</button>
        </div>

        <div id="subManagerPanel" class="section">
            <h2>Sub-Manager - አዲስ ደንበኛ መመዝገቢያ</h2>
            <input type="text" placeholder="ሙሉ ስም">
            <select><option>ጾታ</option><option>ወንድ</option><option>ሴት</option></select>
            <input type="text" placeholder="የፋይዳ መታወቂያ">
            <input type="number" placeholder="ስልክ">
            <input type="number" placeholder="እድሜ">
            <button onclick="generateAcc()">አካውንት ቁጥር አውጣ (Generate 9 Digit)</button>
            <div id="accDisplay" style="margin: 15px; font-weight: bold; color: #fbbf24;"></div>
            <button class="back-btn" onclick="goBack()">ተመለስ</button>
        </div>

        <div id="cashierPanel" class="section">
            <h2>Cashier - የገንዘብ ዝውውር</h2>
            <input type="text" placeholder="የደንበኛ አካውንት ቁጥር (9 ዲጂት)">
            <input type="number" placeholder="የገንዘብ መጠን">
            <div style="display: flex; gap: 10px;">
                <button style="background: #22c55e;" onclick="alert('ገንዘብ ገብቷል!')">Deposit</button>
                <button style="background: #eab308;" onclick="alert('ገንዘብ ወጥቷል!')">Withdraw</button>
            </div>
            <button class="back-btn" onclick="goBack()">ተመለስ</button>
        </div>

        <div id="auditorPanel" class="section">
            <h2>Auditor - የክትትል ሪፖርት</h2>
            <div style="background: #0f172a; padding: 15px; border-radius: 10px;">
                <p>ጠቅላላ የገባ (Total Deposit): 500,000 ETB</p>
                <p>ጠቅላላ የወጣ (Total Withdraw): 120,000 ETB</p>
                <hr>
                <p style="color: #4ade80;">አጠቃላይ ካፒታል: 380,000 ETB</p>
            </div>
            <button class="back-btn" onclick="goBack()">ተመለስ</button>
        </div>
    </div>

    <script>
        function showSection(id) {
            document.getElementById('roleSelection').style.display = 'none';
            document.querySelectorAll('.section').forEach(s => s.classList.remove('active'));
            document.getElementById(id).classList.add('active');
        }

        function goBack() {
            document.getElementById('roleSelection').style.display = 'grid';
            document.querySelectorAll('.section').forEach(s => s.classList.remove('active'));
        }

        function generateAcc() {
            const acc = Math.floor(100000000 + Math.random() * 900000000);
            document.getElementById('accDisplay').innerText = "የተሰጠ አካውንት ቁጥር፡ " + acc;
        }
    </script>
</body>
</html>
