<!DOCTYPE html>
<html lang="am">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ZAGWAE Saving and Credit System</title>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <style>
        :root {
            --primary: #38bdf8;
            --bg: #0f172a;
            --card: #1e293b;
            --gradient: linear-gradient(270deg, #ff0000, #ffff00, #00ff00, #0000ff, #8b00ff);
        }

        body {
            background-color: var(--bg);
            color: #f1f5f9;
            font-family: 'Segoe UI', sans-serif;
            margin: 0;
            display: flex;
            flex-direction: column;
            align-items: center;
            min-height: 100vh;
        }

        /* ርዕስ በህብረ ቀለም */
        .zagwae-header {
            font-size: 3rem;
            font-weight: 900;
            background: var(--gradient);
            background-size: 800% 800%;
            animation: rainbow 10s linear infinite;
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            margin: 30px 0;
            text-align: center;
        }

        @keyframes rainbow { 0%{background-position:0% 50%} 50%{background-position:100% 50%} 100%{background-position:0% 50%} }

        .container {
            background: var(--card);
            padding: 30px;
            border-radius: 20px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.5);
            width: 90%;
            max-width: 800px;
            margin-bottom: 50px;
        }

        .hidden { display: none; }
        
        input, select, button {
            width: 100%;
            padding: 12px;
            margin: 10px 0;
            border-radius: 8px;
            border: 1px solid #475569;
            background: #0f172a;
            color: white;
            box-sizing: border-box;
        }

        button {
            background: var(--primary);
            color: #0f172a;
            font-weight: bold;
            cursor: pointer;
            border: none;
        }

        button:hover { opacity: 0.9; transform: scale(1.01); }

        .role-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(150px, 1fr));
            gap: 15px;
        }

        .role-btn {
            background: #334155;
            padding: 20px;
            border-radius: 12px;
            cursor: pointer;
            text-align: center;
            border: 2px solid transparent;
        }

        .role-btn:hover { border-color: var(--primary); }

        .nav-btns { display: flex; gap: 10px; margin-top: 20px; }
        .back-btn { background: #64748b; color: white; }
    </style>
</head>
<body>

    <h1 class="zagwae-header">ZAGWAE SAVING & CREDIT</h1>

    <div id="loginSection" class="container">
        <h2>ሰራተኛ መለያ</h2>
        <input type="text" id="userInput" placeholder="Username">
        <input type="password" id="passInput" placeholder="Password">
        <button onclick="checkLogin()">ግባ</button>
    </div>

    <div id="managerPanel" class="container hidden">
        <h2 style="color: #60a5fa;">Main Manager Dashboard</h2>
        <div class="role-grid">
            <button onclick="alert('ሰራተኞችን የማገድ ስልጣን ተከፍቷል')">ሰራተኛ አግድ</button>
            <button onclick="alert('ሁሉንም Username መቀየር ትችላለህ')">Credential ቀይር</button>
        </div>
        <button class="back-btn" onclick="logout()">ውጣ</button>
    </div>

    <div id="subManagerPanel" class="container hidden">
        <h2 style="color: #c084fc;">Sub-Manager - አዲስ ደንበኛ መመዝገቢያ</h2>
        <input type="text" id="cName" placeholder="ሙሉ ስም">
        <select id="cGender"><option>ጾታ</option><option>ወንድ</option><option>ሴት</option></select>
        <input type="text" id="cFayda" placeholder="የፋይዳ መታወቂያ">
        <input type="text" id="cPhone" placeholder="ስልክ ቁጥር">
        <button onclick="registerCustomer()">አካውንት ክፈት (Generate 9 Digit)</button>
        <p id="regStatus"></p>
        <button class="back-btn" onclick="logout()">ውጣ</button>
    </div>

    <div id="cashierPanel" class="container hidden">
        <h2 style="color: #fbbf24;">Cashier - ዝውውር (Deposit/Withdraw)</h2>
        <input type="text" id="tAcc" placeholder="የደንበኛ አካውንት ቁጥር">
        <input type="number" id="tAmount" placeholder="የብር መጠን">
        <div style="display: flex; gap: 10px;">
            <button style="background: #22c55e;" onclick="handleTx('deposit')">Deposit</button>
            <button style="background: #ef4444;" onclick="handleTx('withdraw')">Withdraw</button>
        </div>
        <p id="txStatus"></p>
        <button class="back-btn" onclick="logout()">ውጣ</button>
    </div>

    <div id="auditorPanel" class="container hidden">
        <h2 style="color: #4ade80;">Auditor - የክትትል ሪፖርት</h2>
        <div id="auditReport" style="background: #0f172a; padding: 20px; border-radius: 10px;">
            በመጫን ላይ...
        </div>
        <button class="back-btn" onclick="logout()">ውጣ</button>
    </div>

    <script>
        // Supabase Configuration
        const S_URL = 'https://jdyrjrqgelfnditlpveb.supabase.co';
        const S_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImpkeXJqcnFnZWxmbmRpdGxwdmViIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzYwMTY3MTMsImV4cCI6MjA5MTU5MjcxM30.KZIF4VD3SrjLd-KQ_gA0Z9BcxSJR_Ty1x4FYPiI_q4o';
        const _supabase = supabase.createClient(S_URL, S_KEY);

        function checkLogin() {
            const u = document.getElementById('userInput').value;
            const p = document.getElementById('passInput').value;

            document.getElementById('loginSection').classList.add('hidden');

            if(u === "Was*6324" && p === "632436821221") document.getElementById('managerPanel').classList.remove('hidden');
            else if(u === "Was*6324" && p === "12345678") document.getElementById('subManagerPanel').classList.remove('hidden');
            else if(u === "Was*6324" && p === "87654321") document.getElementById('cashierPanel').classList.remove('hidden');
            else if(u === "Wass*6324" && p === "12345678") {
                document.getElementById('auditorPanel').classList.remove('hidden');
                loadAudit();
            } else {
                alert("ተሳስተሃል!");
                document.getElementById('loginSection').classList.remove('hidden');
            }
        }

        async function registerCustomer() {
            const acc = Math.floor(100000000 + Math.random() * 900000000).toString();
            const { error } = await _supabase.from('customers').insert([
                { 
                    full_name: document.getElementById('cName').value,
                    account_number: acc,
                    fayda_id: document.getElementById('cFayda').value,
                    balance: 0 
                }
            ]);
            if(!error) document.getElementById('regStatus').innerText = "ተመዝግቧል! አካውንት ቁጥር፡ " + acc;
        }

        async function handleTx(type) {
            const acc = document.getElementById('tAcc').value;
            const amt = parseFloat(document.getElementById('tAmount').value);
            
            let { data: cust } = await _supabase.from('customers').select('*').eq('account_number', acc).single();
            if(!cust) return alert("አልተገኘም");

            let nb = type === 'deposit' ? cust.balance + amt : cust.balance - amt;
            if(nb < 0) return alert("በቂ ብር የለም");

            await _supabase.from('customers').update({ balance: nb }).eq('account_number', acc);
            document.getElementById('txStatus').innerText = "ተሳክቷል! ቀሪ፡ " + nb;
        }

        async function loadAudit() {
            const { data } = await _supabase.from('customers').select('balance');
            const total = data.reduce((sum, item) => sum + item.balance, 0);
            document.getElementById('auditReport').innerText = "ጠቅላላ የተቀመጠ ገንዘብ (Total Deposit): " + total + " ETB";
        }

        function logout() { location.reload(); }
    </script>
</body>
</html>
