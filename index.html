<!DOCTYPE html>
<html lang="am">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>WASIHUN-AI</title>
    <style>
        /* የገጹ ውበት (CSS) */
        body {
            margin: 0; padding: 0; font-family: 'Segoe UI', sans-serif;
            background: linear-gradient(-45deg, #0f0c29, #302b63, #24243e, #00d2ff);
            background-size: 400% 400%; animation: gradientBG 15s ease infinite;
            height: 100vh; display: flex; justify-content: center; align-items: center; color: white; overflow: hidden;
        }
        @keyframes gradientBG { 0% { background-position: 0% 50%; } 50% { background-position: 100% 50%; } 100% { background-position: 0% 50%; } }
        .logo-text { font-size: 2.5rem; font-weight: 900; text-align: center; margin-bottom: 20px; color: #ffd700; }
        .card { background: rgba(255, 255, 255, 0.1); backdrop-filter: blur(20px); padding: 25px; border-radius: 25px; width: 90%; max-width: 420px; text-align: center; border: 1px solid rgba(255, 255, 255, 0.2); }
        .chat-box { background: rgba(0,0,0,0.3); height: 300px; overflow-y: auto; padding: 15px; border-radius: 15px; text-align: left; margin-bottom: 15px; }
        textarea { width: 100%; height: 60px; border-radius: 12px; border: none; padding: 12px; background: rgba(255, 255, 255, 0.2); color: white; box-sizing: border-box; resize: none; font-size: 1rem; }
        button { width: 100%; padding: 12px; border-radius: 12px; border: none; background: #ffd700; color: #000; font-weight: bold; cursor: pointer; margin-top: 10px; font-size: 1rem; }
        .ai-m { color: #ffd700; margin-top: 8px; background: rgba(0,0,0,0.2); padding: 10px; border-radius: 8px; line-height: 1.5; }
        .user-m { color: #fff; margin-top: 8px; padding-left: 5px; }
    </style>
</head>
<body>

    <div class="card">
        <div class="logo-text">WASIHUN-AI</div>
        <div id="chatDisplay" class="chat-box">
            <div class="ai-m"><b>WASIHUN-AI:</b> ሰላም! እኔ WASIHUN-AI ነኝ። ዛሬ በምን ልርዳህ?</div>
        </div>
        <textarea id="userInput" placeholder="ጥያቄዎን እዚህ ይጻፉ..."></textarea>
        <button id="askBtn" onclick="askAI()">ላክ</button>
    </div>

    <script>
        const API_KEY = "AIzaSyCDPT8UvR9sApQR30yS1hhB-0XfYfOg-zY"; 
        const API_URL = `https://generativelanguage.googleapis.com/v1beta/models/gemini-1.5-flash:generateContent?key=${API_KEY}`;

        async function askAI() {
            const input = document.getElementById('userInput');
            const display = document.getElementById('chatDisplay');
            const btn = document.getElementById('askBtn');
            const text = input.value.trim();

            if (!text) return;

            // የተጠቃሚውን ጥያቄ ማሳየት
            display.innerHTML += `<div class="user-m"><b>እርስዎ:</b> ${text}</div>`;
            input.value = "";
            btn.innerText = "በማሰብ ላይ...";
            btn.disabled = true;
            display.scrollTop = display.scrollHeight;

            try {
                const response = await fetch(API_URL, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({
                        contents: [{ parts: [{ text: text }] }],
                        systemInstruction: {
                            parts: [{ text: "የአንተ ስም WASIHUN-AI ነው። አንተ የኢትዮጵያ የቴክኖሎጂ ረዳት ነህ። ሁልጊዜ ስምህ ሲጠየቅ እኔ WASIHUN-AI ነኝ በል። መልሶችህ አጭር ይሁኑ።" }]
                        }
                    })
                });

                const data = await response.json();
                const aiText = data.candidates[0].content.parts[0].text;
                
                // የ AIውን መልስ ማሳየት
                display.innerHTML += `<div class="ai-m"><b>WASIHUN-AI:</b> ${aiText}</div>`;
                
            } catch (e) {
                display.innerHTML += `<div style="color:red; margin-top:10px;">ይቅርታ፣ ስህተት ተፈጥሯል።</div>`;
            } finally {
                btn.innerText = "ላክ";
                btn.disabled = false;
                display.scrollTop = display.scrollHeight;
            }
        }
    </script>
</body>
</html>
