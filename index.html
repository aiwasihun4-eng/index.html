<!DOCTYPE html>
<html lang="am">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>WASIHUN-AI</title>
    <style>
        body {
            margin: 0; padding: 0; font-family: 'Segoe UI', sans-serif;
            background: linear-gradient(-45deg, #0f0c29, #302b63, #24243e, #00d2ff);
            background-size: 400% 400%; animation: gradientBG 15s ease infinite;
            height: 100vh; display: flex; justify-content: center; align-items: center; color: white; overflow: hidden;
        }
        @keyframes gradientBG { 0% { background-position: 0% 50%; } 50% { background-position: 100% 50%; } 100% { background-position: 0% 50%; } }
        .logo-text { font-size: 2.5rem; font-weight: 900; text-align: center; margin-bottom: 20px; color: #ffd700; }
        .card { background: rgba(255, 255, 255, 0.1); backdrop-filter: blur(20px); padding: 25px; border-radius: 25px; width: 90%; max-width: 420px; text-align: center; border: 1px solid rgba(255, 255, 255, 0.2); }
        .chat-box { background: rgba(0,0,0,0.3); height: 300px; overflow-y: auto; padding: 15px; border-radius: 15px; text-align: left; margin-bottom: 15px; }
        textarea { width: 100%; height: 60px; border-radius: 12px; border: none; padding: 12px; background: rgba(255, 255, 255, 0.2); color: white; box-sizing: border-box; resize: none; }
        button { width: 100%; padding: 12px; border-radius: 12px; border: none; background: #ffd700; color: #000; font-weight: bold; cursor: pointer; margin-top: 10px; }
        .ai-m { color: #ffd700; margin-top: 8px; background: rgba(0,0,0,0.2); padding: 8px; border-radius: 8px; }
        .user-m { color: #fff; margin-top: 8px; }
    </style>
</head>
<body>
    <div class="card">
        <div class="logo-text">WASIHUN-AI</div>
        <div id="chatDisplay" class="chat-box">
            <div class="ai-m"><b>WASIHUN-AI:</b> ሰላም! እኔ WASIHUN-AI ነኝ። ምን ልርዳህ?</div>
        </div>
        <textarea id="userInput" placeholder="ጥያቄዎን እዚህ ይጻፉ..."></textarea>
        <button id="askBtn" onclick="askAI()">ላክ</button>
    </div>

    <script src="script.js"></script>
</body>
</html>
