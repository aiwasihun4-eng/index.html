<!DOCTYPE html>
<html lang="am">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>WASIHUN-AI | የወደፊት ቴክኖሎጂ</title>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <style>
        body {
            margin: 0; padding: 0; font-family: 'Segoe UI', sans-serif;
            background: linear-gradient(-45deg, #ee7752, #e73c7e, #23a6d5, #23d5ab);
            background-size: 400% 400%;
            animation: backgroundMove 15s ease infinite;
            height: 100vh; display: flex; justify-content: center; align-items: center; color: white; overflow: hidden;
        }

        @keyframes backgroundMove { 0% { background-position: 0% 50%; } 50% { background-position: 100% 50%; } 100% { background-position: 0% 50%; } }

        .logo-text {
            font-size: 3rem; font-weight: bold; margin-bottom: 15px;
            display: inline-block;
            animation: float 3s ease-in-out infinite, rainbow 8s linear infinite;
        }

        @keyframes float { 0%, 100% { transform: translateY(0); } 50% { transform: translateY(-15px); } }
        @keyframes rainbow {
            0% { color: #ffffff; } 25% { color: #ffd700; } 50% { color: #00ffcc; } 75% { color: #ff00de; } 100% { color: #ffffff; }
        }

        .card {
            background: rgba(255, 255, 255, 0.15); backdrop-filter: blur(20px);
            padding: 30px; border-radius: 25px; box-shadow: 0 10px 40px rgba(0,0,0,0.2);
            border: 1px solid rgba(255, 255, 255, 0.3); width: 90%; max-width: 420px; text-align: center;
        }

        .chat-container {
            background: rgba(0,0,0,0.25); height: 280px; overflow-y: auto;
            padding: 15px; border-radius: 15px; text-align: left; margin-bottom: 15px;
            font-size: 0.95rem; line-height: 1.5; border: 1px solid rgba(255,255,255,0.1);
        }

        input, textarea {
            width: 100%; padding: 12px; margin: 8px 0; border-radius: 10px; border: none;
            background: rgba(255, 255, 255, 0.2); color: white; box-sizing: border-box; font-size: 1rem;
        }
        textarea { height: 70px; resize: none; }
        input::placeholder, textarea::placeholder { color: #ddd; }

        button {
            width: 100%; padding: 12px; margin-top: 10px; border-radius: 10px; border: none;
            background: #ffffff; color: #e73c7e; font-weight: bold; cursor: pointer; transition: 0.3s; font-size: 1rem;
        }
        button:hover { background: #ffd700; color: #000; transform: translateY(-2px); }
        button:disabled { background: #ccc; cursor: not-allowed; }

        .hidden { display: none; }
        .user-msg { margin-bottom: 12px; color: #fff; }
        .ai-msg { margin-bottom: 12px; color: #ffd700; background: rgba(0,0,0,0.1); padding: 8px; border-radius: 8px; }
    </style>
</head>
<body>

    <div id="app" class="card">
        <div class="logo-text">WASIHUN-AI</div>

        <div id="auth-section">
            <p id="quote" style="font-style: italic; font-size: 0.9rem; margin-bottom: 20px;">"በቃላት የማይገለጹ ጥበቦችን በ WASIHUN-AI አሳክተው ለዓለም ያሳዩ።"</p>
            <div id="signup-fields">
                <input type="text" id="reg-name" placeholder="ሙሉ ስም">
                <input type="tel" id="reg-phone" placeholder="ስልክ ቁጥር" value="+251">
            </div>
            <input type="email" id="email" placeholder="Gmail">
            <input type="password" id="pass" placeholder="Password (6 ድጂት)" maxlength="6">
            <button id="auth-btn" onclick="handleAuth()">Sign Up</button>
            <p id="toggle-text" style="cursor:pointer; font-size:0.85rem; margin-top:15px; text-decoration: underline;" onclick="toggleAuthMode()">አካውንት አለኝ? Login</p>
        </div>

        <div id="chat-section" class="hidden">
            <h3 id="welcome-msg" style="margin-top:0;">ሰላም!</h3>
            <div id="chat-box" class="chat-container">
                <div class="ai-msg"><b>WASIHUN-AI:</b> ሰላም! ምን ልርዳዎት? ጥያቄዎን እታች ባለው ሳጥን ይጻፉ።</div>
            </div>
            <textarea id="user-input" placeholder="ጥያቄዎን እዚህ ይጻፉ..."></textarea>
            <button id="send-btn" onclick="askWasihunAI()">AIን ጠይቅ</button>
            <button onclick="location.reload()" style="background:#ff4757; color:white; margin-top:10px;">Logout</button>
        </div>
    </div>

    <script>
        // Configuration
        const S_URL = 'https://jdyrjrqgelfnditlpveb.supabase.co';
        const S_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImpkeXJqcnFnZWxmbmRpdGxwdmViIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzYwMTY3MTMsImV4cCI6MjA5MTU5MjcxM30.KZIF4VD3SrjLd-KQ_gA0Z9BcxSJR_Ty1x4FYPiI_q4o';
        const GEMINI_KEY = 'AIzaSyAdWBWJQKyPtfGlU6n-X3iBI0_fTQLWtDY';
        
        const _supabase = supabase.createClient(S_URL, S_KEY);
        let isLoginMode = false;

        function toggleAuthMode() {
            isLoginMode = !isLoginMode;
            document.getElementById('signup-fields').classList.toggle('hidden');
            document.getElementById('auth-btn').innerText = isLoginMode ? "Login" : "Sign Up";
            document.getElementById('toggle-text').innerText = isLoginMode ? "አዲስ ነኝ? Sign Up" : "አካውንት አለኝ? Login";
        }

        async function handleAuth() {
            const email = document.getElementById('email').value;
            const pass = document.getElementById('pass').value;
            const name = document.getElementById('reg-name').value;
            const phone = document.getElementById('reg-phone').value;

            if(!email || !pass) return alert("እባክዎን መረጃ ይሙሉ!");

            if(!isLoginMode) {
                // Sign Up Logic
                const { error } = await _supabase.from('profiles').insert([{ full_name: name, email: email, phone_number: phone }]);
                if(error) return alert("ምዝገባ አልተሳካም: " + error.message);
                
                localStorage.setItem('uName', name);
                localStorage.setItem('uEmail', email);
                localStorage.setItem('uPass', pass);
                alert("በተሳካ ሁኔታ ተመዝግበዋል! አሁን Login ያድርጉ።");
                toggleAuthMode();
            } else {
                // Login Logic
                if(email === localStorage.getItem('uEmail') && pass === localStorage.getItem('uPass')) {
                    document.getElementById('auth-section').classList.add('hidden');
                    document.getElementById('chat-section').classList.remove('hidden');
                    document.getElementById('welcome-msg').innerText = "ሰላም " + (localStorage.getItem('uName') || "ተጠቃሚ") + "!";
                } else {
                    alert("የተሳሳተ ኢሜይል ወይም ፓስዎርድ!");
                }
            }
        }

        async function askWasihunAI() {
            const input = document.getElementById('user-input');
            const chatBox = document.getElementById('chat-box');
            const btn = document.getElementById('send-btn');
            
            if(!input.value.trim()) return;

            const userText = input.value;
            chatBox.innerHTML += `<div class="user-msg"><b>እርስዎ:</b> ${userText}</div>`;
            input.value = "";
            btn.innerText = "በማሰብ ላይ...";
            btn.disabled = true;
            chatBox.scrollTop = chatBox.scrollHeight;

            try {
                const response = await fetch(`https://generativelanguage.googleapis.com/v1beta/models/gemini-1.5-flash:generateContent?key=${GEMINI_KEY}`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ contents: [{ parts: [{ text: userText }] }] })
                });

                const data = await response.json();
                if(data.candidates && data.candidates[0].content.parts[0].text) {
                    const aiMsg = data.candidates[0].content.parts[0].text;
                    chatBox.innerHTML += `<div class="ai-msg"><b>WASIHUN-AI:</b> ${aiMsg}</div>`;
                } else {
                    throw new Error("Invalid response");
                }
            } catch (e) {
                chatBox.innerHTML += `<div style="color:#ff4757;"><b>ስህተት:</b> ግንኙነት ተቋርጧል። እባክዎ ኢንተርኔትዎን አረጋግጠው እንደገና ይሞክሩ።</div>`;
            } finally {
                btn.innerText = "AIን ጠይቅ";
                btn.disabled = false;
                chatBox.scrollTop = chatBox.scrollHeight;
            }
        }
    </script>
</body>
</html>
